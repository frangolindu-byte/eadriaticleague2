<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eAdriatic League — Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --bg-glass-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.1);
            --green-ring: rgba(16, 185, 129, 0.3);
            --yellow: #f59e0b;
            --yellow-bg: rgba(245, 158, 11, 0.1);
            --yellow-ring: rgba(245, 158, 11, 0.3);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --blue: #3b82f6;
            --blue-bg: rgba(59, 130, 246, 0.1);
            --purple: #a855f7;
            --purple-bg: rgba(168, 85, 247, 0.1);
            --cyan: #06b6d4;
            --cyan-bg: rgba(6, 182, 212, 0.1);
            --orange: #f97316;
            --orange-bg: rgba(249, 115, 22, 0.1);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.4);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 260px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(16, 185, 129, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* === SIDEBAR === */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: var(--sidebar-width);
            background: rgba(11, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-brand h1 {
            font-size: 1.15rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .sidebar-brand .subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px;
        }

        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .nav-section {
            margin-bottom: 16px;
        }

        .nav-section-title {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            padding: 8px 12px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.82rem;
            color: var(--text-secondary);
            position: relative;
        }

        .nav-item:hover {
            background: var(--bg-glass-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-glow);
            color: var(--accent-light);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
        }

        .nav-item .count {
            margin-left: auto;
            font-size: 0.68rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 999px;
            background: var(--bg-glass);
            color: var(--text-muted);
        }

        .nav-item.active .count {
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent-light);
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .sidebar-footer .live-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--green-ring); }
            50% { opacity: 0.8; box-shadow: 0 0 0 6px transparent; }
        }

        /* === MAIN === */
        .main {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 16px 32px;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 420px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 42px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: inherit;
            transition: all var(--transition);
            outline: none;
        }

        .search-box input::placeholder { color: var(--text-muted); }
        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: var(--bg-glass-hover);
        }

        .search-box svg {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 16px; height: 16px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-xs);
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            outline: none;
        }

        .btn-ghost {
            background: var(--bg-glass);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-glass-hover);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover { background: var(--accent-light); }

        .btn svg { width: 14px; height: 14px; }

        .status-info {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        /* === CONTENT === */
        .content {
            padding: 28px 32px 60px;
        }

        /* === STAT CARDS === */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: all var(--transition);
        }

        .stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-card .icon {
            width: 40px; height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }

        .stat-card .icon svg { width: 20px; height: 20px; }
        .stat-card .icon.blue { background: var(--blue-bg); color: var(--blue); }
        .stat-card .icon.green { background: var(--green-bg); color: var(--green); }
        .stat-card .icon.yellow { background: var(--yellow-bg); color: var(--yellow); }
        .stat-card .icon.purple { background: var(--purple-bg); color: var(--purple); }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-card .trend {
            position: absolute;
            top: 18px; right: 18px;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 999px;
        }

        .stat-card .trend.up { background: var(--green-bg); color: var(--green); }
        .stat-card .trend.down { background: var(--red-bg); color: var(--red); }

        /* === TABS === */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px;
            width: fit-content;
        }

        .tab {
            padding: 8px 20px;
            border-radius: var(--radius-xs);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            background: none;
            font-family: inherit;
        }

        .tab:hover { color: var(--text-primary); }

        .tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        /* === PANELS === */
        .panel {
            display: none;
        }

        .panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === FILTER BAR === */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text-secondary);
            font-family: inherit;
        }

        .filter-chip:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .filter-chip.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .filter-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        .filter-chip.status-finalizado.active { background: var(--green); border-color: var(--green); }
        .filter-chip.status-agendado.active { background: var(--yellow); border-color: var(--yellow); color: #000; }

        /* === TABLE === */
        .table-container {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .table-header h3 {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .table-header .result-count {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .table-scroll { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        thead th {
            text-align: left;
            padding: 12px 18px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            background: var(--bg-glass);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: color var(--transition);
        }

        thead th:hover { color: var(--text-primary); }
        thead th.sorted { color: var(--accent-light); }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--bg-glass-hover); }

        td {
            padding: 12px 18px;
            white-space: nowrap;
        }

        .team-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .team-name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .team-player {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .score-display {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .score-display .home { color: var(--text-primary); }
        .score-display .sep { color: var(--text-muted); font-weight: 400; }
        .score-display .away { color: var(--text-primary); }
        .score-display .winner { color: var(--green); }

        .vs-text {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .badge-finalizado {
            background: var(--green-bg);
            color: var(--green);
        }

        .badge-agendado {
            background: var(--yellow-bg);
            color: var(--yellow);
        }

        .badge-finalizado::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: currentColor;
        }

        .badge-agendado::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.5s infinite;
        }

        .liga-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: var(--radius-xs);
            font-size: 0.72rem;
            font-weight: 600;
            background: var(--bg-glass);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        /* === CLASSIFICATION === */
        .classif-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        .classif-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all var(--transition);
        }

        .classif-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow);
        }

        .classif-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .classif-header h3 {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .classif-header .players-count {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .classif-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }

        .classif-table thead th {
            padding: 8px 10px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .classif-table thead th:nth-child(2) { text-align: left; }

        .classif-table tbody td {
            padding: 8px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .classif-table tbody td:nth-child(2) { text-align: left; }
        .classif-table tbody tr:last-child { border-bottom: none; }
        .classif-table tbody tr:hover { background: var(--bg-glass-hover); }

        .classif-table .pos {
            font-weight: 800;
            font-size: 0.75rem;
            width: 28px;
        }

        .classif-table .pos-1 { color: #fbbf24; }
        .classif-table .pos-2 { color: #94a3b8; }
        .classif-table .pos-3 { color: #d97706; }

        .classif-table .player-name {
            font-weight: 600;
            font-size: 0.8rem;
        }

        .classif-table .pts {
            font-weight: 800;
            color: var(--accent-light);
            font-size: 0.85rem;
        }

        .classif-table .sg-pos { color: var(--green); }
        .classif-table .sg-neg { color: var(--red); }

        .classif-chart {
            padding: 12px 16px 16px;
            height: 180px;
        }

        /* === RESUMO === */
        .resumo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .resumo-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all var(--transition);
        }

        .resumo-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow);
        }

        .resumo-card h4 {
            font-size: 0.88rem;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .resumo-card h4 .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .resumo-stats {
            display: flex;
            gap: 16px;
        }

        .resumo-stat {
            flex: 1;
            text-align: center;
        }

        .resumo-stat .val {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1;
        }

        .resumo-stat .lbl {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .resumo-bar {
            margin-top: 14px;
            height: 6px;
            background: var(--bg-glass);
            border-radius: 999px;
            overflow: hidden;
            display: flex;
        }

        .resumo-bar .done {
            background: var(--green);
            transition: width 0.5s ease;
        }

        .resumo-bar .pending {
            background: var(--yellow);
            transition: width 0.5s ease;
        }

        /* === LOADING === */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 20px;
        }

        .loader {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* === EMPTY STATE === */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 48px; height: 48px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state p { font-size: 0.9rem; }

        /* === MOBILE TOGGLE === */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 20px; right: 20px;
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            z-index: 200;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            align-items: center;
            justify-content: center;
        }

        .mobile-toggle svg { width: 20px; height: 20px; }

        /* === RESPONSIVE === */
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .classif-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .mobile-toggle { display: flex; }
            .topbar { padding: 12px 16px; }
            .content { padding: 20px 16px 80px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card { padding: 16px; }
            .stat-card .value { font-size: 1.5rem; }
            .filter-bar { gap: 6px; }
            .resumo-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        /* === ANIMATIONS === */
        .fade-in {
            animation: fadeIn 0.4s ease both;
        }

        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.1s; }
        .stagger-3 { animation-delay: 0.15s; }
        .stagger-4 { animation-delay: 0.2s; }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h1>eAdriatic League</h1>
            <div class="subtitle">Dashboard ao vivo</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">Principal</div>
                <div class="nav-item active" data-nav="all" onclick="setNav('all')">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    Todos os Jogos
                    <span class="count" id="nav-count-all">0</span>
                </div>
                <div class="nav-item" data-nav="finalizados" onclick="setNav('finalizados')">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    Finalizados
                    <span class="count" id="nav-count-finalizados">0</span>
                </div>
                <div class="nav-item" data-nav="agendados" onclick="setNav('agendados')">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Agendados
                    <span class="count" id="nav-count-agendados">0</span>
                </div>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">Ligas</div>
                <div id="nav-ligas"></div>
            </div>
        </nav>
        <div class="sidebar-footer">
            <span class="live-dot"></span>
            <span id="last-update">Atualizando...</span>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
        <header class="topbar">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="search-input" placeholder="Buscar jogador, time ou liga..." oninput="handleSearch(this.value)">
            </div>
            <div class="topbar-actions">
                <span class="status-info" id="status-info"></span>
                <button class="btn btn-ghost" onclick="loadData()" title="Atualizar dados">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Atualizar
                </button>
            </div>
        </header>

        <div class="content">
            <!-- LOADING -->
            <div id="loading" class="loading-screen">
                <div class="loader"></div>
                <div class="loading-text">Carregando dados da liga...</div>
            </div>

            <!-- APP -->
            <div id="app" style="display:none;">
                <!-- STATS -->
                <div class="stats-grid" id="stats-grid"></div>

                <!-- TABS -->
                <div class="tabs">
                    <button class="tab active" onclick="setTab('jogos')">Jogos</button>
                    <button class="tab" onclick="setTab('classificacao')">Classificacao</button>
                    <button class="tab" onclick="setTab('resumo')">Resumo</button>
                </div>

                <!-- PANEL: JOGOS -->
                <div class="panel active" id="panel-jogos">
                    <div class="filter-bar" id="filter-bar"></div>
                    <div class="table-container">
                        <div class="table-header">
                            <h3 id="jogos-title">Todos os Jogos</h3>
                            <span class="result-count" id="jogos-result-count"></span>
                        </div>
                        <div class="table-scroll">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Liga</th>
                                        <th>Jogador 1</th>
                                        <th style="text-align:center">Placar</th>
                                        <th>Jogador 2</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="jogos-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- PANEL: CLASSIFICACAO -->
                <div class="panel" id="panel-classificacao">
                    <div class="classif-grid" id="classif-grid"></div>
                </div>

                <!-- PANEL: RESUMO -->
                <div class="panel" id="panel-resumo">
                    <div class="resumo-grid" id="resumo-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE TOGGLE -->
    <button class="mobile-toggle" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <script>
        // === STATE ===
        let allGames = [];
        let filteredGames = [];
        let currentNav = 'all';
        let currentTab = 'jogos';
        let currentLigaFilter = 'all';
        let currentStatusFilter = 'all';
        let searchQuery = '';
        let charts = [];

        const LIGA_COLORS = [
            '#6366f1', '#10b981', '#f59e0b', '#ef4444', '#3b82f6',
            '#a855f7', '#06b6d4', '#f97316', '#ec4899', '#14b8a6',
            '#8b5cf6', '#64748b', '#e11d48', '#0ea5e9', '#84cc16',
            '#f43f5e', '#22c55e', '#d946ef', '#fb923c', '#38bdf8'
        ];

        function getLigaColor(liga) {
            const ligas = [...new Set(allGames.map(g => g.liga))].sort();
            const idx = ligas.indexOf(liga);
            return LIGA_COLORS[idx % LIGA_COLORS.length];
        }

        function getTeamColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return LIGA_COLORS[Math.abs(hash) % LIGA_COLORS.length];
        }

        function getInitials(name) {
            return name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
        }

        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        // === NAV ===
        function setNav(nav) {
            currentNav = nav;
            currentLigaFilter = 'all';
            currentStatusFilter = 'all';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.nav-item[data-nav="${nav}"]`)?.classList.add('active');
            applyFilters();
            closeSidebarMobile();
        }

        function setNavLiga(liga) {
            currentNav = 'liga';
            currentLigaFilter = liga;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.nav-item[data-nav-liga="${liga}"]`)?.classList.add('active');
            applyFilters();
            closeSidebarMobile();
        }

        // === TABS ===
        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
            document.getElementById(`panel-${tab}`).classList.add('active');
        }

        // === FILTERS ===
        function applyFilters() {
            filteredGames = allGames.filter(g => {
                if (currentNav === 'finalizados' && g.status !== 'Finalizado') return false;
                if (currentNav === 'agendados' && g.status !== 'Agendado') return false;
                if (currentNav === 'liga' && g.liga !== currentLigaFilter) return false;
                if (currentStatusFilter !== 'all') {
                    const st = currentStatusFilter === 'finalizado' ? 'Finalizado' : 'Agendado';
                    if (g.status !== st) return false;
                }
                if (currentLigaFilter !== 'all' && currentNav !== 'liga') {
                    if (g.liga !== currentLigaFilter) return false;
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    return g.liga.toLowerCase().includes(q) ||
                           g.p1.toLowerCase().includes(q) ||
                           g.p2.toLowerCase().includes(q);
                }
                return true;
            });

            renderJogos();
            updateResultCount();
        }

        function handleSearch(val) {
            searchQuery = val.trim();
            applyFilters();
        }

        function setLigaFilter(liga) {
            currentLigaFilter = liga;
            renderFilterBar();
            applyFilters();
        }

        function setStatusFilter(status) {
            currentStatusFilter = status;
            renderFilterBar();
            applyFilters();
        }

        // === RENDER ===
        function render(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            allGames = data.jogos;
            filteredGames = [...allGames];

            document.getElementById('last-update').textContent = data.updated_at;
            document.getElementById('status-info').textContent = `${allGames.length} jogos carregados`;

            renderStats(data.summary);
            renderNavLigas(data.jogos);
            renderFilterBar();
            renderJogos();
            renderClassificacao(data.classificacao);
            renderResumo(data.resumo);
            updateResultCount();
        }

        function renderStats(s) {
            document.getElementById('nav-count-all').textContent = s.total;
            document.getElementById('nav-count-finalizados').textContent = s.finalizados;
            document.getElementById('nav-count-agendados').textContent = s.agendados;

            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card fade-in stagger-1">
                    <div class="icon blue">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    </div>
                    <div class="value">${s.total}</div>
                    <div class="label">Total de Jogos</div>
                </div>
                <div class="stat-card fade-in stagger-2">
                    <div class="icon green">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="value">${s.finalizados}</div>
                    <div class="label">Finalizados</div>
                </div>
                <div class="stat-card fade-in stagger-3">
                    <div class="icon yellow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div class="value">${s.agendados}</div>
                    <div class="label">Agendados</div>
                </div>
                <div class="stat-card fade-in stagger-4">
                    <div class="icon purple">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                    </div>
                    <div class="value">${s.ligas}</div>
                    <div class="label">Ligas Ativas</div>
                </div>
            `;
        }

        function renderNavLigas(jogos) {
            const ligas = [...new Set(jogos.map(j => j.liga))].sort();
            const counts = {};
            jogos.forEach(j => { counts[j.liga] = (counts[j.liga] || 0) + 1; });

            document.getElementById('nav-ligas').innerHTML = ligas.map(liga => `
                <div class="nav-item" data-nav-liga="${esc(liga)}" onclick="setNavLiga('${liga.replace(/'/g, "\\'")}')">
                    <span style="width:8px;height:8px;border-radius:50%;background:${getLigaColor(liga)};flex-shrink:0"></span>
                    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(liga)}</span>
                    <span class="count">${counts[liga]}</span>
                </div>
            `).join('');
        }

        function renderFilterBar() {
            const ligas = [...new Set(allGames.map(j => j.liga))].sort();

            let html = `
                <button class="filter-chip ${currentLigaFilter === 'all' ? 'active' : ''}" onclick="setLigaFilter('all')">Todas Ligas</button>
            `;

            ligas.slice(0, 8).forEach(liga => {
                html += `<button class="filter-chip ${currentLigaFilter === liga ? 'active' : ''}" onclick="setLigaFilter('${liga.replace(/'/g, "\\'")}')">${esc(liga.split('(')[0].trim())}</button>`;
            });

            html += `<div class="filter-divider"></div>`;
            html += `<button class="filter-chip ${currentStatusFilter === 'all' ? 'active' : ''}" onclick="setStatusFilter('all')">Todos</button>`;
            html += `<button class="filter-chip status-finalizado ${currentStatusFilter === 'finalizado' ? 'active' : ''}" onclick="setStatusFilter('finalizado')">Finalizados</button>`;
            html += `<button class="filter-chip status-agendado ${currentStatusFilter === 'agendado' ? 'active' : ''}" onclick="setStatusFilter('agendado')">Agendados</button>`;

            document.getElementById('filter-bar').innerHTML = html;
        }

        function renderJogos() {
            const games = filteredGames;

            let title = 'Todos os Jogos';
            if (currentNav === 'finalizados') title = 'Jogos Finalizados';
            else if (currentNav === 'agendados') title = 'Jogos Agendados';
            else if (currentNav === 'liga') title = currentLigaFilter;
            if (searchQuery) title = `Resultados para "${searchQuery}"`;

            document.getElementById('jogos-title').textContent = title;

            if (games.length === 0) {
                document.getElementById('jogos-body').innerHTML = `
                    <tr><td colspan="5">
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                            <p>Nenhum jogo encontrado</p>
                        </div>
                    </td></tr>
                `;
                return;
            }

            document.getElementById('jogos-body').innerHTML = games.map(g => {
                const isFinished = g.status === 'Finalizado';
                const placar = g.placar || 'VS';
                const cls = isFinished ? 'finalizado' : 'agendado';

                let scoreHtml;
                if (isFinished && placar.includes('-')) {
                    const [s1, s2] = placar.split('-');
                    const g1 = parseInt(s1), g2 = parseInt(s2);
                    scoreHtml = `<div class="score-display">
                        <span class="${g1 > g2 ? 'winner' : 'home'}">${esc(s1)}</span>
                        <span class="sep">-</span>
                        <span class="${g2 > g1 ? 'winner' : 'away'}">${esc(s2)}</span>
                    </div>`;
                } else {
                    scoreHtml = `<span class="vs-text">VS</span>`;
                }

                return `<tr>
                    <td><span class="liga-tag" style="border-color:${getLigaColor(g.liga)}30;color:${getLigaColor(g.liga)}">${esc(g.liga)}</span></td>
                    <td>
                        <div class="team-cell">
                            <div class="team-avatar" style="background:${getTeamColor(g.p1)}">${getInitials(g.p1)}</div>
                            <div>
                                <div class="team-name">${esc(g.p1)}</div>
                            </div>
                        </div>
                    </td>
                    <td style="text-align:center">${scoreHtml}</td>
                    <td>
                        <div class="team-cell">
                            <div class="team-avatar" style="background:${getTeamColor(g.p2)}">${getInitials(g.p2)}</div>
                            <div>
                                <div class="team-name">${esc(g.p2)}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge badge-${cls}">${esc(g.status)}</span></td>
                </tr>`;
            }).join('');
        }

        function updateResultCount() {
            document.getElementById('jogos-result-count').textContent = `${filteredGames.length} resultado${filteredGames.length !== 1 ? 's' : ''}`;
        }

        function renderClassificacao(classif) {
            if (!classif || Object.keys(classif).length === 0) {
                document.getElementById('classif-grid').innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                        <p>Nenhuma classificacao disponivel ainda</p>
                    </div>
                `;
                return;
            }

            charts.forEach(c => c.destroy());
            charts = [];

            const entries = Object.entries(classif).sort((a, b) => b[1].length - a[1].length);

            document.getElementById('classif-grid').innerHTML = entries.map(([liga, tabela]) => {
                const chartId = 'chart-' + liga.replace(/[^a-zA-Z0-9]/g, '-');

                return `<div class="classif-card fade-in">
                    <div class="classif-header">
                        <h3 style="color:${getLigaColor(liga)}">${esc(liga)}</h3>
                        <span class="players-count">${tabela.length} jogadores</span>
                    </div>
                    <table class="classif-table">
                        <thead>
                            <tr><th>#</th><th>Jogador</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr>
                        </thead>
                        <tbody>
                            ${tabela.map(t => {
                                const posCls = t.pos <= 3 ? `pos-${t.pos}` : '';
                                const sgCls = t.SG > 0 ? 'sg-pos' : t.SG < 0 ? 'sg-neg' : '';
                                return `<tr>
                                    <td class="pos ${posCls}">${t.pos}</td>
                                    <td class="player-name">${esc(t.nome)}</td>
                                    <td class="pts">${t.Pts}</td>
                                    <td>${t.J}</td>
                                    <td>${t.V}</td>
                                    <td>${t.E}</td>
                                    <td>${t.D}</td>
                                    <td>${t.GP}</td>
                                    <td>${t.GC}</td>
                                    <td class="${sgCls}">${t.SG > 0 ? '+' : ''}${t.SG}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                    <div class="classif-chart"><canvas id="${chartId}"></canvas></div>
                </div>`;
            }).join('');

            entries.forEach(([liga, tabela]) => {
                const chartId = 'chart-' + liga.replace(/[^a-zA-Z0-9]/g, '-');
                const canvas = document.getElementById(chartId);
                if (!canvas) return;

                const top10 = tabela.slice(0, 10);
                const sorted = [...top10].reverse();

                charts.push(new Chart(canvas, {
                    type: 'bar',
                    data: {
                        labels: sorted.map(t => t.nome),
                        datasets: [{
                            label: 'Pontos',
                            data: sorted.map(t => t.Pts),
                            backgroundColor: sorted.map((t, i) => {
                                const alpha = 0.5 + (i / sorted.length) * 0.5;
                                return `rgba(99, 102, 241, ${alpha})`;
                            }),
                            borderRadius: 6,
                            borderSkipped: false,
                            barThickness: 18,
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                        },
                        scales: {
                            x: {
                                ticks: { color: '#64748b', font: { size: 10 }, stepSize: 1 },
                                grid: { color: 'rgba(255,255,255,0.04)' },
                                border: { color: 'rgba(255,255,255,0.06)' }
                            },
                            y: {
                                ticks: { color: '#94a3b8', font: { size: 10, weight: '600' } },
                                grid: { display: false },
                                border: { display: false }
                            }
                        }
                    }
                }));
            });
        }

        function renderResumo(resumo) {
            if (!resumo || Object.keys(resumo).length === 0) {
                document.getElementById('resumo-grid').innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1">
                        <p>Nenhum resumo disponivel</p>
                    </div>
                `;
                return;
            }

            const sorted = Object.entries(resumo).sort((a, b) => b[1].total - a[1].total);

            document.getElementById('resumo-grid').innerHTML = sorted.map(([liga, s]) => {
                const pct = s.total > 0 ? Math.round((s.finalizados / s.total) * 100) : 0;
                const color = getLigaColor(liga);

                return `<div class="resumo-card fade-in">
                    <h4>
                        <span class="dot" style="background:${color}"></span>
                        ${esc(liga)}
                    </h4>
                    <div class="resumo-stats">
                        <div class="resumo-stat">
                            <div class="val" style="color:var(--text-primary)">${s.total}</div>
                            <div class="lbl">Total</div>
                        </div>
                        <div class="resumo-stat">
                            <div class="val" style="color:var(--green)">${s.finalizados}</div>
                            <div class="lbl">Finalizados</div>
                        </div>
                        <div class="resumo-stat">
                            <div class="val" style="color:var(--yellow)">${s.agendados}</div>
                            <div class="lbl">Agendados</div>
                        </div>
                    </div>
                    <div class="resumo-bar">
                        <div class="done" style="width:${pct}%;background:${color}"></div>
                        <div class="pending" style="width:${100 - pct}%"></div>
                    </div>
                </div>`;
            }).join('');
        }

        // === MOBILE ===
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function closeSidebarMobile() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        // === LOAD DATA ===
        async function loadData() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            charts.forEach(c => c.destroy());
            charts = [];

            try {
                const res = await fetch('data.json?t=' + Date.now());
                if (!res.ok) throw new Error('data.json nao encontrado');
                const data = await res.json();
                render(data);
            } catch (e) {
                document.getElementById('loading').innerHTML = `
                    <div style="text-align:center">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#ef4444" stroke-width="2" style="margin-bottom:12px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        <p style="color:#f87171;font-size:0.9rem">Erro ao carregar: ${e.message}</p>
                        <button class="btn btn-primary" style="margin-top:16px" onclick="loadData()">Tentar novamente</button>
                    </div>
                `;
            }
        }

        loadData();
        setInterval(loadData, 120000);
    </script>
</body>
</html>
